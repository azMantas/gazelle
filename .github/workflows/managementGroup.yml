name: managementGroups

on:
  pull_request:

  push:
    branches:
      - tst/**
  
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  linter:
    if: startsWith(github.ref, 'refs/heads/tst/') 
    uses: ./.github/workflows/reuse-linter.yml
    with:
      bicepFilePath: ./managementGroups/bicep-main/managementGroups.bicep

  tst:
    needs: linter
    if: startsWith(github.ref, 'refs/heads/tst/') 
    uses: ./.github/workflows/reuse-managementGroup.yml
    secrets: inherit

  prod:
    needs: tst
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/reuse-managementGroup.yml
    secrets: inherit

