name: managementGroups

on:
  push:

  pull_request_target:
    types:
      - closed
  
  workflow_dispatch:


permissions:
  id-token: write
  contents: read

jobs:
  linter:
    if: github.ref != 'refs/heads/main'
    uses: ./.github/workflows/reuse-linter.yml
    with:
      bicepFilePath: ./managementGroups/bicep-main/managementGroups.bicep

  tst:
    needs: linter
    if: github.ref != 'refs/heads/main'
    uses: ./.github/workflows/reuse-managementGroup.yml
    with:
      environment: tst
    secrets: inherit


  prod:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/reuse-managementGroup.yml
    with:
      environment: prod
    secrets: inherit
