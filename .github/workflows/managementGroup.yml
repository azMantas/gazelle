name: managementGroups

on:
  pull_request_review:
    types: 
      - submitted
  push:
    branches:
      - tst/**
      - main
  

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # linter:
  #   if: startsWith(github.ref, 'refs/heads/tst/') 
  #   uses: ./.github/workflows/reuse-linter.yml
  #   with:
  #     bicepFilePath: ./managementGroups/bicep-main/managementGroups.bicep

  tst:
    # needs: linter
    if: startsWith(github.ref, 'refs/heads/tst/') 
    uses: ./.github/workflows/reuse-managementGroup.yml
    with:
      template-file: ./managementGroups/bicep-main/managementGroups.bicep
    secrets: inherit

  prod:
    needs: tst
    if: github.event.review.state == 'approved'
    uses: ./.github/workflows/reuse-managementGroup.yml
    with:
      template-file: ./managementGroups/bicep-main/managementGroups.bicep
    secrets: inherit

