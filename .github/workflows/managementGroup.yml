name: managementGroups

on:
  pull_request:
    branches:
      -main
  # push:
  #   branches:
  #     - tst/**
  #     - main
  
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # linter:
  #   if: startsWith(github.ref, 'refs/heads/tst/') 
  #   uses: ./.github/workflows/reuse-linter.yml

  tst:
    # needs: linter
    if: startsWith(github.ref, 'refs/heads/tst/') 
    uses: ./.github/workflows/reuse-managementGroup.yml
    secrets: inherit

  prod:
    needs: tst
    if: github.event.review.state == 'approved'
    uses: ./.github/workflows/reuse-managementGroup.yml
    secrets: inherit

