name: managementGroups

env:
  mainBicepFile: ./managementGroups/bicep-main/managementGroups.bicep

on:
  push:
    branches:
      - main
      - tst/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  linter: 
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/tst/')
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      
      - name: Run Bicep Linter
        uses: azure/cli@v1
        with:
          inlineScript: |
            az bicep build -f $mainBicepFile

  managementGroup:
    needs: linter
    runs-on: ubuntu-latest
    environment: ${{ github.ref != 'refs/heads/main' && 'tst' || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.PLATFORM_IDENTITY_CLIENT_ID}}
          tenant-id: ${{ secrets.TENANT_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: true

      - name: mgmt hierarchy
        uses: azure/cli@v1
        with:
          inlineScript: |
            az deployment mg create \
             --name 'bigBang' \
             --location 'westeurope' \
             --management-group-id ${{ secrets.TENANT_ID }} \
             --template-file $mainBicepFile \
             --parameters ./managementGroups/param/managementGroups.bicepparam \
             --parameters environment=${{ vars.ENVIRONMENT }} \
             --parameters topLevelManagementGroupname=${{ vars.topLevelManagementGroupname}}
